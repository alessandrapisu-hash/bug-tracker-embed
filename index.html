<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Bug Tracker — Waalaxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7f7f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #ffffff; border-bottom: 1px solid #e5e5e5; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    header .dot { width: 10px; height: 10px; border-radius: 50%; background: #f97316; display: inline-block; }
    header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    header .badge { margin-left: auto; font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 99px; }
    .embed-container { flex: 1; width: 100%; overflow: hidden; }
    .embed-container iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>🐛 Support Bug Tracker — Waalaxy</h1>
    <span class="badge">Live · Airtable</span>
  </header>
  <div class="embed-container">
    <iframe src="https://airtable.com/embed/shrCdPhtGRQ9M6yNT" allowfullscreen allow="fullscreen" title="Support Bug Tracker"></iframe>
  </div>
</body>
</html>
