<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Waalaxy Support Bug Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}
  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:#1a1d2e;border-bottom:1px solid #2d3148;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  header h1{font-size:18px;font-weight:700;color:#fff;flex:1;}
  .badge{background:#1e3a5f;color:#60a5fa;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;border:1px solid #2563eb;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s;}
  .btn-refresh{background:#6366f1;color:#fff;}
  .btn-csv{background:#059669;color:#fff;}
  .btn-pdf{background:#64748b;color:#fff;}
  .btn:hover{opacity:.85;}
  /* FILTER BAR */
  .filter-bar{background:#1a1d2e;border-bottom:1px solid #2d3148;padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .preset-btn{padding:5px 14px;border-radius:20px;border:1px solid #2d3148;background:transparent;color:#94a3b8;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
  .preset-btn.active,.preset-btn:hover{background:#6366f1;color:#fff;border-color:#6366f1;}
  .date-input{background:#0f1117;border:1px solid #2d3148;color:#e2e8f0;padding:5px 10px;border-radius:8px;font-size:12px;}
  .filter-sep{color:#2d3148;margin:0 4px;}
  /* MAIN */
  main{padding:20px 24px;max-width:1400px;margin:0 auto;}
  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .kpi-card{background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;padding:16px;text-align:center;}
  .kpi-card .val{font-size:32px;font-weight:800;line-height:1;}
  .kpi-card .lbl{font-size:11px;color:#64748b;margin-top:6px;text-transform:uppercase;letter-spacing:.05em;}
  .kpi-card .sub{font-size:11px;color:#475569;margin-top:4px;}
  /* CHARTS */
  .charts-grid{display:grid;grid-template-columns:1fr 1.4fr 1.4fr;gap:16px;margin-bottom:24px;}
  .chart-card{background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;padding:16px;}
  .chart-card h3{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;}
  .chart-wrap{position:relative;}
  /* TICKETS */
  .tickets-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
  .tickets-col{background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;padding:16px;}
  .tickets-col h2{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .ticket-item{background:#0f1117;border:1px solid #2d3148;border-radius:8px;padding:12px;margin-bottom:8px;}
  .ticket-item:last-child{margin-bottom:0;}
  .ticket-title{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:6px;line-height:1.4;}
  .ticket-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ticket-channel{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .ch-business{background:#1e3a5f;color:#60a5fa;}
  .ch-linkedin{background:#2d1e5f;color:#a78bfa;}
  .ch-prospection{background:#1e3d2d;color:#34d399;}
  .ticket-tag{font-size:10px;padding:2px 6px;border-radius:6px;background:#1e293b;color:#94a3b8;border:1px solid #334155;}
  .ticket-date{font-size:11px;color:#475569;margin-left:auto;}
  .ticket-links{margin-top:8px;display:flex;gap:8px;}
  .ticket-link{font-size:11px;color:#6366f1;text-decoration:none;}
  .ticket-link:hover{text-decoration:underline;}
  .ticket-link.clickup{color:#7c3aed;}
  /* ESCALATIONS TABLE */
  .escl-card{background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;padding:16px;margin-bottom:24px;}
  .escl-card h2{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid #2d3148;}
  td{padding:8px 10px;font-size:13px;border-bottom:1px solid #1e293b;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .s-open{background:#3b1e1e;color:#f87171;}
  .s-inprogress{background:#3b2e0e;color:#fbbf24;}
  .s-resolved{background:#1a2e1a;color:#4ade80;}
  .s-notabug{background:#1e2030;color:#94a3b8;}
  /* FOOTER */
  footer{text-align:center;padding:20px;color:#475569;font-size:12px;border-top:1px solid #2d3148;margin-top:8px;}
  footer a{color:#6366f1;text-decoration:none;}
  /* EMPTY */
  .empty-msg{color:#475569;font-size:13px;text-align:center;padding:20px;}
  /* PRINT */
  @media print{
    .filter-bar,.no-print,header .btn{display:none!important;}
    body{background:#fff;color:#000;}
    header{background:#fff;color:#000;position:relative;}
    .kpi-card,.chart-card,.tickets-col,.escl-card{background:#fff;border-color:#ddd;break-inside:avoid;}
    .ticket-item{background:#f8f8f8;}
    table td,table th{color:#000;}
  }
  @media(max-width:900px){
    .charts-grid{grid-template-columns:1fr;}
    .tickets-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <h1>🐛 Waalaxy Support Bug Dashboard</h1>
  <span class="badge">🟢 Live · Notion</span>
  <button class="btn btn-refresh no-print" onclick="triggerRefresh()">↻ Refresh</button>
  <button class="btn btn-csv no-print" onclick="exportCSV()">⬇ CSV</button>
  <button class="btn btn-pdf no-print" onclick="exportPDF()">🖨 PDF</button>
</header>

<div class="filter-bar no-print">
  <button class="preset-btn active" onclick="setPreset('all',this)">All time</button>
  <button class="preset-btn" onclick="setPreset('7d',this)">Last 7 days</button>
  <button class="preset-btn" onclick="setPreset('30d',this)">Last 30 days</button>
  <button class="preset-btn" onclick="setPreset('custom',this)">Custom</button>
  <span class="filter-sep">|</span>
  <input type="date" id="dateFrom" class="date-input" onchange="onCustomDate()" style="display:none"/>
  <input type="date" id="dateTo" class="date-input" onchange="onCustomDate()" style="display:none"/>
</div>

<main>
  <!-- KPI -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Status Breakdown</h3>
      <div class="chart-wrap" style="height:200px"><canvas id="chartDonut"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Tickets by Channel</h3>
      <div class="chart-wrap" style="height:200px"><canvas id="chartChannel"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Top Tags</h3>
      <div class="chart-wrap" style="height:200px"><canvas id="chartTags"></canvas></div>
    </div>
  </div>

  <!-- Open + In-Progress columns -->
  <div class="tickets-row">
    <div class="tickets-col">
      <h2>🔴 Open Tickets <span id="openCount" style="color:#64748b;font-weight:400;font-size:12px"></span></h2>
      <div id="openList"></div>
    </div>
    <div class="tickets-col">
      <h2>🟡 In Progress <span id="ipCount" style="color:#64748b;font-weight:400;font-size:12px"></span></h2>
      <div id="ipList"></div>
    </div>
  </div>

  <!-- Dev Escalations -->
  <div class="escl-card">
    <h2>🚀 Dev Escalations <span id="esclCount" style="color:#64748b;font-weight:400;font-size:12px"></span></h2>
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Channel</th>
          <th>Status</th>
          <th>ClickUp</th>
        </tr>
      </thead>
      <tbody id="esclTable"></tbody>
    </table>
    <div id="esclEmpty" class="empty-msg" style="display:none">No escalations in this period.</div>
  </div>
</main>

<footer>
  Updated April 3, 2026 · Data from <a href="https://www.notion.so/b5006b6c2930433bbca7681cb31193c6" target="_blank">Notion Bug Tracker - Dev Tickets</a> · Waalaxy Support
</footer>

// Chart registry
const CHARTS = {};
function mkChart(id, cfg){
  if(CHARTS[id]) CHARTS[id].destroy();
  const ctx = document.getElementById(id);
  if(!ctx) return;
  CHARTS[id] = new Chart(ctx, cfg);
}

// Filter state
let fStart = null, fEnd = null;

function filtered(){
  return TICKETS.filter(t => {
    if(!fStart && !fEnd) return true;
    if(!t.date) return true; // undated tickets always show
    const d = t.date;
    if(fStart && d < fStart) return false;
    if(fEnd && d > fEnd) return false;
    return true;
  });
}

function setPreset(p, btn){
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const from = document.getElementById('dateFrom');
  const to   = document.getElementById('dateTo');
  if(p==='custom'){
    from.style.display=''; to.style.display='';
    fStart = from.value||null; fEnd = to.value||null;
  } else {
    from.style.display='none'; to.style.display='none';
    const now = new Date('2026-04-03');
    if(p==='all'){ fStart=null; fEnd=null; }
    else if(p==='7d'){ const d=new Date(now); d.setDate(d.getDate()-7); fStart=d.toISOString().slice(0,10); fEnd=null; }
    else if(p==='30d'){ const d=new Date(now); d.setDate(d.getDate()-30); fStart=d.toISOString().slice(0,10); fEnd=null; }
  }
  render();
}

function onCustomDate(){
  fStart = document.getElementById('dateFrom').value||null;
  fEnd   = document.getElementById('dateTo').value||null;
  render();
}

function channelClass(ch){
  if(ch==='Business') return 'ch-business';
  if(ch==='LinkedIn Hackers') return 'ch-linkedin';
  return 'ch-prospection';
}

function statusBadge(s){
  if(s==='open') return '<span class="status-badge s-open">🔴 Open</span>';
  if(s==='in-progress') return '<span class="status-badge s-inprogress">🟡 In Progress</span>';
  if(s==='resolved') return '<span class="status-badge s-resolved">🟢 Resolved</span>';
  return '<span class="status-badge s-notabug">⚪ Not a Bug</span>';
}

function ticketCard(t){
  const chCls = channelClass(t.channel);
  const tags = t.tags.map(tg=>`<span class="ticket-tag">${tg}</span>`).join(' ');
  const dateStr = t.date ? `<span class="ticket-date">${t.date}</span>` : '';
  let links = '';
  if(t.slack) links += `<a class="ticket-link" href="${t.slack}" target="_blank">🔗 Slack</a>`;
  if(t.clickup) links += `<a class="ticket-link clickup" href="${t.clickup}" target="_blank">🟣 ClickUp</a>`;
  return `<div class="ticket-item">
    <div class="ticket-title">${escHtml(t.title)}</div>
    <div class="ticket-meta">
      <span class="ticket-channel ${chCls}">${t.channel}</span>
      ${tags}
      ${dateStr}
    </div>
    ${links ? `<div class="ticket-links">${links}</div>` : ''}
  </div>`;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(){
  const data = filtered();
  const total    = data.length;
  const open     = data.filter(t=>t.status==='open').length;
  const ip       = data.filter(t=>t.status==='in-progress').length;
  const resolved = data.filter(t=>t.status==='resolved').length;
  const nab      = data.filter(t=>t.status==='not-a-bug').length;
  const escl     = data.filter(t=>t.clickup).length;
  const resRate  = total ? Math.round(resolved/total*100) : 0;
  const esclRate = total ? Math.round(escl/total*100) : 0;

  // KPIs
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card"><div class="val">${total}</div><div class="lbl">Total Tickets</div></div>
    <div class="kpi-card"><div class="val" style="color:#f87171">${open}</div><div class="lbl">🔴 Open</div></div>
    <div class="kpi-card"><div class="val" style="color:#fbbf24">${ip}</div><div class="lbl">🟡 In Progress</div></div>
    <div class="kpi-card"><div class="val" style="color:#4ade80">${resolved}</div><div class="lbl">🟢 Resolved</div><div class="sub">${resRate}% resolution rate</div></div>
    <div class="kpi-card"><div class="val" style="color:#94a3b8">${nab}</div><div class="lbl">⚪ Not a Bug</div></div>
    <div class="kpi-card"><div class="val" style="color:#a78bfa">${escl}</div><div class="lbl">🚀 Dev Escalations</div><div class="sub">${esclRate}% escalation rate</div></div>
  `;

  // Donut chart
  mkChart('chartDonut',{
    type:'doughnut',
    data:{
      labels:['Open','In Progress','Resolved','Not a Bug'],
      datasets:[{
        data:[open,ip,resolved,nab],
        backgroundColor:['#ef4444','#f59e0b','#22c55e','#64748b'],
        borderWidth:0
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}}}
  });

  // Stacked bar by channel
  const channels=['Business','LinkedIn Hackers','Prospection'];
  const statusKeys=['open','in-progress','resolved','not-a-bug'];
  const statusColors=['#ef4444','#f59e0b','#22c55e','#64748b'];
  const statusLabels=['Open','In Progress','Resolved','Not a Bug'];
  const chDatasets = statusKeys.map((sk,i)=>({
    label:statusLabels[i],
    data:channels.map(ch=>data.filter(t=>t.channel===ch&&t.status===sk).length),
    backgroundColor:statusColors[i]
  }));
  mkChart('chartChannel',{
    type:'bar',
    data:{labels:channels,datasets:chDatasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11},boxWidth:12}}},
      scales:{
        x:{stacked:true,ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}},
        y:{stacked:true,ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}}
      }
    }
  });

  // Horizontal bar — top tags
  const tagCounts={};
  data.forEach(t=>t.tags.forEach(tg=>tagCounts[tg]=(tagCounts[tg]||0)+1));
  const sorted = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  mkChart('chartTags',{
    type:'bar',
    data:{
      labels:sorted.map(e=>e[0]),
      datasets:[{data:sorted.map(e=>e[1]),backgroundColor:'#6366f1',borderRadius:4}]
    },
    options:{
      indexAxis:'y',
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}}
      }
    }
  });

  // Open + In-Progress lists
  const openTickets = data.filter(t=>t.status==='open');
  const ipTickets   = data.filter(t=>t.status==='in-progress');
  document.getElementById('openCount').textContent = `(${openTickets.length})`;
  document.getElementById('ipCount').textContent   = `(${ipTickets.length})`;
  document.getElementById('openList').innerHTML = openTickets.length
    ? openTickets.map(ticketCard).join('')
    : '<div class="empty-msg">No open tickets.</div>';
  document.getElementById('ipList').innerHTML = ipTickets.length
    ? ipTickets.map(ticketCard).join('')
    : '<div class="empty-msg">No in-progress tickets.</div>';

  // Escalations table
  const esclTickets = data.filter(t=>t.clickup);
  document.getElementById('esclCount').textContent = `(${esclTickets.length})`;
  const tbody = document.getElementById('esclTable');
  const emptyMsg = document.getElementById('esclEmpty');
  if(esclTickets.length===0){
    tbody.innerHTML=''; emptyMsg.style.display='';
  } else {
    emptyMsg.style.display='none';
    tbody.innerHTML = esclTickets.map(t=>`<tr>
      <td>${escHtml(t.title)}</td>
      <td><span class="ticket-channel ${channelClass(t.channel)}">${t.channel}</span></td>
      <td>${statusBadge(t.status)}</td>
      <td><a href="${t.clickup}" target="_blank" class="ticket-link clickup">🟣 ${t.clickup.split('/').pop()}</a></td>
    </tr>`).join('');
  }
}

function triggerRefresh(){
  window.location.href = window.location.pathname + '?v=' + Date.now();
}

function exportCSV(){
  const BOM = '\uFEFF';
  const headers = ['title','channel','tags','status','date','slack','clickup'];
  const rows = TICKETS.map(t=>[
    `"${t.title.replace(/"/g,'""')}"`,
    `"${t.channel}"`,
    `"${t.tags.join(';')}"`,
    `"${t.status}"`,
    `"${t.date}"`,
    `"${t.slack}"`,
    `"${t.clickup}"`
  ].join(','));
  const csv = BOM + [headers.join(','),...rows].join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='waalaxy-bugs-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url);
}

function exportPDF(){
  window.print();
}

// Initial render
render();
</script>
